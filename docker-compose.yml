services:
  api:
    build:
      context: ./api
    container_name: nac_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nac_network

  db:
    image: postgres:18-alpine
    container_name: nac_postgres
    env_file: .env # Contains DB secrets
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - ./postgres/data:/var/lib/postgresql # Persistent data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql # Initial DB setup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nac_network

  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac_radius
    hostname: radius-server
    env_file: .env
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=db
    ports:
      - "1812:1812/udp" # Authorization/Authentication
      - "1813:1813/udp" # Accounting
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pidof", "freeradius"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nac_network

networks:
  nac_network:
    driver: bridge
